# STEFAN Code Review — Aider
#
# Setup:
#   Option A: Copy this file to your project root as .aider.conf.yml
#   Option B: Copy system-prompt.md from adapters/raw/ and use:
#             aider --read system-prompt.md
#
# Usage:
#   aider --read adapters/raw/system-prompt.md
